<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <!-- Primary Meta Tags -->
  <title>Video Downloader Pro</title>
  <meta name="title" content="Video Downloader Pro">
  <meta name="description" content="Download videos from YouTube, TikTok, Instagram, Facebook, Twitter, and Pinterest">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#7c3aed">
  
  <!-- Favicon - Standard sizes -->
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/icons/icon-48x48.png">
  
  <!-- PWA Icons - Android/Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512x512.png">
  
  <!-- Apple Touch Icons - iOS -->
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/static/icons/icon-167x167.png">
  
  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#7c3aed">
  <meta name="msapplication-TileImage" content="/static/icons/icon-144x144.png">
  
  <!-- Manifest -->
  <link rel="manifest" href="/static/manifest.json">
  
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="splash">
  <i class="fas fa-video" style="font-size: 5rem;"></i>
  <h1 style="margin: 16px 0 8px;">Video Downloader</h1>
  <p>Connecting to engine...</p>
  <div class="spinner"></div>
  <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 20px;">
    <i class="fas fa-mobile-alt"></i> Works on all devices • Install as app for best experience
  </p>
</div>

<div class="app">
  <div class="card">
    <h2>
      <i class="fas fa-download"></i> Video Downloader
    </h2>

    <!-- URL input -->
    <input id="url" placeholder="Paste video link (YouTube, TikTok, IG...)" value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">

    <select id="quality">
      <option value="best">🎥 Best quality (video+audio)</option>
      <option value="1080">🎬 1080p Full HD</option>
      <option value="720">📺 720p HD</option>
      <option value="audio">🎵 Audio only (MP3)</option>
    </select>

    <!-- platforms with FontAwesome icons -->
    <div class="platforms">
      <div class="platform-item" data-url="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></div>
      <div class="platform-item" data-url="instagram" title="Instagram"><i class="fab fa-instagram"></i></div>
      <div class="platform-item" data-url="facebook" title="Facebook"><i class="fab fa-facebook"></i></div>
      <div class="platform-item" data-url="twitter" title="X (Twitter)"><i class="fab fa-x-twitter"></i></div>
      <div class="platform-item" data-url="youtube" title="YouTube"><i class="fab fa-youtube"></i></div>
      <div class="platform-item" data-url="pinterest" title="Pinterest"><i class="fab fa-pinterest"></i></div>
    </div>

    <!-- Preview card -->
    <div id="previewCard" class="preview-card">
      <img id="previewThumb" class="preview-thumb" src="" alt="thumbnail">
      <div class="preview-info">
        <div id="previewTitle" class="preview-title"></div>
        <div id="previewMeta" class="preview-meta"></div>
      </div>
    </div>

    <!-- main download button -->
    <button onclick="window.app.startDownload()" id="downloadBtn">
      <i class="fas fa-cloud-download-alt"></i> Download
    </button>

    <!-- progress bar + status -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="status">
      <i class="fas fa-circle-notch fa-spin"></i> Ready
    </div>

    <!-- recent downloads -->
    <div class="history">
      <h4><i class="far fa-clock"></i> Downloaded files</h4>
      <div id="files">
        <!-- files will be loaded here -->
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" sizes="192x192" href="/src/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/src/icons/icon-192.png">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="/static/manifest.json">
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>Video Downloader · FastAPI + yt-dlp</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="splash">
  <i class="fas fa-video" style="font-size: 5rem;"></i>
  <h1 style="margin: 16px 0 8px;">Video Downloader</h1>
  <p>connecting to engine...</p>
  <div class="spinner"></div>
  <p>Open on PC for better experience</p>
</div>

<div class="app">
  <div class="card">
    <h2>
      <i class="fas fa-download"></i> Video Downloader
    </h2>

    <!-- URL input -->
    <input id="url" placeholder="Paste video link (YouTube, TikTok, IG...)" >

    <select id="quality">
      <option value="best">🎥 Best quality (video+audio)</option>
      <option value="1080">🎬 1080p Full HD</option>
      <option value="720">📺 720p HD</option>
      <option value="audio">🎵 Audio only (MP3)</option>
    </select>

    <!-- platforms with FontAwesome icons -->
    <div class="platforms">
      <div class="platform-item" data-url="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></div>
      <div class="platform-item" data-url="instagram" title="Instagram"><i class="fab fa-instagram"></i></div>
      <div class="platform-item" data-url="facebook" title="Facebook"><i class="fab fa-facebook"></i></div>
      <div class="platform-item" data-url="twitter" title="X (Twitter)"><i class="fab fa-x-twitter"></i></div>
      <div class="platform-item" data-url="youtube" title="YouTube"><i class="fab fa-youtube"></i></div>
      <div class="platform-item" data-url="pinterest" title="Pinterest"><i class="fab fa-pinterest"></i></div>
    </div>

    <!-- Preview card -->
    <div id="previewCard" class="preview-card">
      <img id="previewThumb" class="preview-thumb" src="" alt="thumbnail">
      <div class="preview-info">
        <div id="previewTitle" class="preview-title"></div>
        <div id="previewMeta" class="preview-meta"></div>
      </div>
    </div>

    <!-- main download button -->
    <button onclick="window.app.startDownload()" id="downloadBtn">
      <i class="fas fa-cloud-download-alt"></i> Download
    </button>

    <!-- progress bar + status -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="status">
      <i class="fas fa-circle-notch fa-spin"></i> Ready
    </div>

    <!-- recent downloads -->
    <div class="history">
      <h4><i class="far fa-clock"></i> Downloaded files</h4>
      <div id="files">
        <!-- files will be loaded here -->
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
<script src="/static/sw.js"></script>
</body>
</html>
